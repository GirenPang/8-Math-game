<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巨人數學 - 乘法公式大挑戰</title>
<style>
:root{
  --green:#22c55e;--red:#ef4444;--red-bright:#f87171;
  --blue-bright:#60a5fa;--orange-bright:#fb923c;
  --text-primary:#f1f5f9;--text-muted:#94a3b8;
  --bg-panel:#1e293b;--bg-surface:#273449;
  --border-soft:rgba(255,255,255,0.08);
  --accent1:#a78bfa;--accent2:#7c3aed;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;min-height:100%;font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",-apple-system,sans-serif;font-size:17px;}
body{min-height:100vh;background:linear-gradient(160deg,#0b1120,#161f33);display:flex;justify-content:center;padding:20px;}
.app{width:100%;max-width:760px;}
.hidden{display:none!important;}

.brand-bar{padding:4px 6px 18px;}
.brand-name{font-weight:800;font-size:22px;color:var(--text-primary);letter-spacing:1px;}

.panel{background:var(--bg-panel);border:1px solid var(--border-soft);border-radius:24px;padding:30px 26px;box-shadow:0 6px 22px rgba(0,0,0,0.45);}
.title{text-align:center;font-size:22px;font-weight:800;color:var(--text-primary);margin:0 0 6px 0;}
.subtitle{text-align:center;font-size:14px;color:#f87171;font-weight:700;margin:0 0 16px 0;letter-spacing:.5px;}

.total-score-banner{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;border-radius:18px;padding:18px;text-align:center;margin-bottom:18px;box-shadow:0 6px 16px rgba(124,58,237,0.35);}
.total-score-banner .label{font-size:14px;opacity:0.92;font-weight:600;}
.total-score-banner .big{font-size:32px;font-weight:800;}
.total-score-banner.small{padding:12px;margin-bottom:18px;}
.total-score-banner.small .big{font-size:26px;}

.btn-primary{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;border:none;padding:15px;border-radius:14px;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 6px 14px rgba(124,58,237,0.35);flex:1;transition:transform .15s;}
.btn-primary:hover{transform:translateY(-2px);}
.btn-primary:active{transform:scale(0.96);}
.btn-secondary{flex:1;background:var(--bg-surface);color:var(--text-primary);border:none;padding:15px;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;}
.btn-secondary:hover{background:#334155;}
.btn-row{display:flex;gap:12px;}

/* ── Level Cards ── */
.level-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:20px;}
.level-card{position:relative;border-radius:20px;padding:18px 20px;color:#fff;cursor:pointer;transition:transform .15s;box-shadow:0 4px 20px rgba(0,0,0,0.35);display:flex;align-items:center;gap:16px;}
.level-card:hover{transform:translateY(-3px) scale(1.01);}
.level-card:active{transform:scale(0.97);}
.level-card .emoji{font-size:38px;flex-shrink:0;}
.level-card .info{flex:1;text-align:left;}
.level-card .name{font-size:18px;font-weight:800;margin:0 0 4px;}
.level-card .meta{font-size:13px;opacity:0.9;font-weight:600;line-height:1.6;}
.level-card .best{font-size:14px;font-weight:700;background:rgba(255,255,255,0.22);border-radius:10px;padding:4px 12px;white-space:nowrap;}
@keyframes ssrPulseGlow{0%,100%{box-shadow:0 4px 16px rgba(251,191,36,0.4);}50%{box-shadow:0 4px 28px rgba(251,191,36,0.8);}}
.level-card.ssr-card{animation:ssrPulseGlow 2.4s ease-in-out infinite;}

.rules-note{font-size:14px;color:var(--text-muted);line-height:1.8;text-align:center;}

/* ── Header ── */
.header{background:var(--bg-panel);border:1px solid var(--border-soft);border-radius:22px;padding:18px 22px;margin-bottom:14px;box-shadow:0 6px 22px rgba(0,0,0,0.45);}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;}
.back-btn{background:var(--bg-surface);color:var(--text-primary);border:none;border-radius:10px;padding:8px 16px;font-size:15px;font-weight:700;cursor:pointer;}
.back-btn:hover{background:#334155;}
.level-badge-pill{color:#fff;font-weight:800;font-size:15px;padding:8px 18px;border-radius:999px;box-shadow:0 3px 8px rgba(0,0,0,0.25);}
.stats-row{display:flex;justify-content:space-between;gap:10px;margin-bottom:12px;}
.stat-box{flex:1;text-align:center;background:var(--bg-surface);border-radius:14px;padding:8px 6px;}
.stat-label{font-size:13px;color:var(--text-muted);font-weight:700;}
.stat-value{font-size:24px;font-weight:800;color:var(--text-primary);}
#play-score{color:var(--accent1);}#play-combo{color:var(--orange-bright);}#play-time{color:var(--red-bright);}
.timer-bar-bg{height:9px;background:#334155;border-radius:6px;overflow:hidden;}
.timer-bar{height:100%;width:100%;background:var(--green);border-radius:6px;}

/* ── Playing area ── */
.playing-area{position:relative;}
.progress-text{text-align:center;color:var(--text-muted);font-weight:700;font-size:15px;margin-bottom:8px;}
.progress-dots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:12px;}
.dot{width:14px;height:14px;border-radius:50%;background:#334155;transition:background .2s;}
.dot-correct{background:var(--green);}.dot-wrong{background:var(--red);}

/* ── Question Card ── */
.question-card{background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:22px;padding:26px 22px 24px;margin-bottom:14px;text-align:center;box-shadow:0 6px 20px rgba(0,0,0,0.4);min-height:96px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.q-type-tag{font-size:12px;font-weight:800;letter-spacing:.8px;padding:3px 14px;border-radius:999px;background:rgba(167,139,250,0.25);color:#c4b5fd;text-transform:uppercase;}
#question{font-size:27px;font-weight:800;color:#fff;letter-spacing:.5px;line-height:1.4;}

/* ── 3-option single column ── */
.answer-options{display:flex;flex-direction:column;gap:12px;}
.option-btn{
  padding:18px 22px;border:none;border-radius:18px;
  font-size:19px;font-weight:800;cursor:pointer;
  transition:transform .12s, box-shadow .12s;
  color:#fff;line-height:1.5;min-height:66px;
  display:flex;align-items:center;justify-content:flex-start;
  text-align:left;position:relative;overflow:hidden;
}
/* 光澤條 */
.option-btn::after{
  content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,0.18) 0%,rgba(255,255,255,0) 100%);
  border-radius:18px 18px 0 0;pointer-events:none;
}
.option-btn:hover{transform:translateY(-3px) scale(1.012);box-shadow:0 8px 24px rgba(0,0,0,0.45);}
.option-btn:active{transform:scale(0.97);}
/* ABC 標籤 */
.option-btn .opt-label{
  display:inline-flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;
  background:rgba(0,0,0,0.28);border-radius:8px;
  padding:3px 10px;margin-right:14px;flex-shrink:0;min-width:32px;
}
.option-btn .opt-text{flex:1;}

/* 選項漸層主題 */
.opt-A{
  background:linear-gradient(135deg,#3b82f6 0%,#1d4ed8 50%,#1e40af 100%);
  box-shadow:0 5px 18px rgba(37,99,235,0.45);
  border:1px solid rgba(147,197,253,0.2);
}
.opt-B{
  background:linear-gradient(135deg,#a855f7 0%,#7c3aed 50%,#6d28d9 100%);
  box-shadow:0 5px 18px rgba(124,58,237,0.45);
  border:1px solid rgba(216,180,254,0.2);
}
.opt-C{
  background:linear-gradient(135deg,#14b8a6 0%,#0f766e 50%,#0d5a54 100%);
  box-shadow:0 5px 18px rgba(15,118,110,0.45);
  border:1px solid rgba(94,234,212,0.2);
}

@keyframes correctPulse{0%{transform:scale(1);}40%{transform:scale(1.1);background:#15803d!important;box-shadow:0 0 0 8px rgba(34,197,94,0.35);}100%{transform:scale(1);background:#16a34a!important;}}
@keyframes wrongShake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
@keyframes revealPulse{0%{transform:scale(1);}50%{transform:scale(1.06);}100%{transform:scale(1);}}
.option-btn.correct-flash{animation:correctPulse 0.45s ease forwards;background:#16a34a!important;}
.option-btn.wrong-flash{animation:wrongShake 0.4s ease;background:#dc2626!important;}
.option-btn.reveal-flash{animation:revealPulse 0.5s ease;box-shadow:0 0 0 4px rgba(250,204,21,0.9)!important;}

.points-popup{position:absolute;font-weight:800;font-size:15px;pointer-events:none;animation:floatUp 0.8s ease forwards;z-index:50;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-40px);}}

/* ── Result ── */
#result-title{text-align:center;margin:0 0 18px;color:var(--text-primary);font-size:22px;font-weight:800;}
.thumbsup-stage{width:120px;height:120px;margin:0 auto 20px;border-radius:50%;background:linear-gradient(135deg,#fde68a,#fbbf24);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 26px rgba(251,191,36,0.45);}
.thumbsup-stage .icon{font-size:60px;line-height:1;}
.record-banner{border-radius:14px;padding:11px;margin-bottom:14px;font-weight:800;font-size:16px;text-align:center;}
@keyframes recordPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
.record-banner.is-new{background:linear-gradient(135deg,#fde68a,#fbbf24);color:#7c2d12;animation:recordPulse 1s ease infinite;}
.record-banner.is-old{background:var(--bg-surface);color:var(--text-muted);}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.result-box{background:var(--bg-surface);border-radius:14px;padding:14px;text-align:center;}
.result-label{font-size:14px;color:var(--text-muted);font-weight:700;}
.result-value{font-size:26px;font-weight:800;color:var(--text-primary);}
.footer-hint{text-align:center;color:var(--text-muted);font-size:14px;margin-top:16px;}
</style>
</head>

<script>
(function(){
'use strict';

// ════════════════════════════════════════════
// 等級設定
// ════════════════════════════════════════════
const LEVELS=[
  {
    id:'basic',name:'基礎公式級',emoji:'🌱',timePerQ:12,multiplier:1,
    grad:['#34d399','#059669'],
    desc:'純公式辨識・專治正負號眼殘',
    // 正向 3 種 + 逆向 3 種，共 6 種，12 題循環剛好每種出 2 次
    questionTypes:['sq_sum','sq_diff','diff_of_sq','sq_sum_rev','sq_diff_rev','diff_of_sq_rev'],
  },
  {
    id:'mid',name:'單變數進階級',emoji:'⚔️',timePerQ:8,multiplier:1.5,
    grad:['#60a5fa','#2563eb'],
    desc:'代入常數・練習 2ab 展開',
    questionTypes:['num_sq_sum','num_sq_diff','num_diff_of_sq'],
  },
  {
    id:'ssr',name:'係數魔王級',emoji:'👑',timePerQ:12,multiplier:3,
    grad:['#fbbf24','#d97706'],
    desc:'前項係數・複合平方陷阱',
    questionTypes:['coef_sq_sum','coef_sq_diff','coef_diff_of_sq'],
  },
];
const levelBestScores={basic:0,mid:0,ssr:0};
const TOTAL_Q=12;

let currentLevel=null;
let questionIndex=0,levelScore=0,combo=0,correctCount=0,wrongCount=0;
let currentAnswerKey=null,questionActive=false;
let questionTimeout=null,tickInterval=null,advanceTimeout=null;
let tilesByKey={};   // key → button element
let progressDotEls=[];
let basicQueue=[];   // 基礎等級循環佇列

// ════════════════════════════════════════════
// 工具函式
// ════════════════════════════════════════════
const SCREENS=['select','playing','result'];
function showScreen(n){SCREENS.forEach(s=>document.getElementById('screen-'+s).classList.toggle('hidden',s!==n));}
function clearAllTimers(){clearTimeout(questionTimeout);clearInterval(tickInterval);clearTimeout(advanceTimeout);}
function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ── 正號係數輸出（省略 1）
function coefStr(c){
  if(c===1) return '';
  if(c===-1) return '-';
  return String(c);
}
// ── 正號/負號符號（用於加法項之間）
function signStr(n){return n>=0?'+':'-';}
// ── 絕對值字串
function absStr(n){return String(Math.abs(n));}

// ════════════════════════════════════════════
// 公式字串產生器（MathML-free 純 Unicode）
// ─ 使用上標字元讓 ² 直接顯示
// ════════════════════════════════════════════

// 把 "x²" "9" "6x" 組合成完整展開式
// 參數統一物件格式，方便干擾項複用

/**
 * 格式化三項展開式  Ax² ± Bx ± C
 * @param {number} A - x² 的係數
 * @param {number} B - x 的係數（含正負）
 * @param {number} C - 常數項（含正負）
 * @param {string} varName - 變數名稱（預設 x）
 */
function fmt3(A,B,C,v='x'){
  // A*v²
  let s='';
  if(A===1) s=`${v}²`;
  else if(A===-1) s=`-${v}²`;
  else s=`${A}${v}²`;
  // B*v
  if(B!==0){
    if(B===1) s+=` + ${v}`;
    else if(B===-1) s+=` - ${v}`;
    else if(B>0) s+=` + ${B}${v}`;
    else s+=` - ${Math.abs(B)}${v}`;
  }
  // C
  if(C!==0){
    if(C>0) s+=` + ${C}`;
    else s+=` - ${Math.abs(C)}`;
  }
  return s;
}

/**
 * 格式化兩項差  v² - k²
 */
function fmt2diff(A,B,v='x'){
  // A*v² - B
  let s='';
  if(A===1) s=`${v}²`;
  else s=`${A}${v}²`;
  s+=` - ${B}`;
  return s;
}

// ════════════════════════════════════════════
// 題型定義
// ════════════════════════════════════════════

// ── 等級一：純符號，a b 用字母
function gen_sq_sum(){
  // (a + b)² = a² + 2ab + b²
  const sign=pick(['+','-']);
  const isPlus=sign==='+';
  const qText=`(a ${sign} b)² = ?`;
  const tag='完全平方公式';
  // 正確答案
  const correct= isPlus ? 'a² + 2ab + b²' : 'a² - 2ab + b²';
  // 干擾項（固定四種陷阱）
  const distractors= isPlus
    ? ['a² + 2ab - b²', 'a² + ab + b²', 'a² + b²']
    : ['a² - 2ab - b²', 'a² - ab + b²', 'a² - b²'];
  return {qText,tag,correct,distractors};
}

function gen_sq_diff(){
  // (a + b)(a - b) = a² - b²
  // 隨機決定順序
  const flip=Math.random()<0.5;
  const qText= flip ? '(a - b)(a + b) = ?' : '(a + b)(a - b) = ?';
  const tag='平方差公式';
  const correct='a² - b²';
  const distractors=['a² + b²','a² - 2ab - b²','-a² - b²'];
  return {qText,tag,correct,distractors};
}

function gen_diff_of_sq(){
  // (a - b)² = a² - 2ab + b²  （已在 sq_sum 含，這裡出另一種題型：展開式辨認）
  // 改為：給展開式，找對應的因式
  // a² - 2ab + b² = ?
  const qText='a² - 2ab + b² = ?';
  const tag='逆向辨認';
  const correct='(a - b)²';
  const distractors=['(a + b)²','(a - b)(a + b)','-(a + b)²'];
  return {qText,tag,correct,distractors};
}

// ── 等級一：逆向題（展開式 → 因式）
function gen_sq_sum_rev(){
  // a² + 2ab + b² = ? → (a+b)²
  // a² - 2ab + b² = ? → (a-b)²
  const isPlus=Math.random()<0.5;
  const tag='逆向辨認';
  const qText= isPlus ? 'a² + 2ab + b² = ?' : 'a² - 2ab + b² = ?';
  const correct= isPlus ? '(a + b)²' : '(a - b)²';
  const distractors= isPlus
    ? ['(a - b)²', '(a + b)(a - b)', '(a + b)² - 2ab']
    : ['(a + b)²', '(a - b)(a + b)', '-(a + b)²'];
  return {qText,tag,correct,distractors};
}

function gen_sq_diff_rev(){
  // a² - b² = ? → (a+b)(a-b)
  const tag='逆向辨認';
  const qText='a² - b² = ?';
  const correct='(a + b)(a - b)';
  const distractors=['(a - b)²', '(a + b)²', '(a + b)(a + b)'];
  return {qText,tag,correct,distractors};
}

function gen_diff_of_sq_rev(){
  // (a - b)² = a² - 2ab + b²  逆向：給因式辨認題型標籤變化
  // 改為：哪個展開式「不是」(a-b)² 的結果？反向排除題
  // 或：已知 (a-b)(a+b) = ?，給不同形式干擾
  // 這裡做：展開式 a²-b² 的因式選擇（與 sq_diff_rev 互補，這次改隱含變化）
  const tag='逆向辨認';
  // 隨機選正向還是負號版平方差
  const isPlus=Math.random()<0.5;
  const qText= isPlus ? '(a + b)(a - b) = ?' : '(a - b)(a + b) = ?';
  const correct='a² - b²';
  const distractors=['a² + b²', 'a² - 2ab + b²', '-a² + b²'];
  return {qText,tag,correct,distractors};
}

// ── 等級二：代入數字 (x ± n)²  /  (x+a)(x-a)
function gen_num_sq_sum(){
  const n=randInt(1,9);
  const sign=pick(['+','-']);
  const isPlus=sign==='+';
  const tag='完全平方公式';
  const qText=`(x ${sign} ${n})² = ?`;

  // 正確: x² ± 2nx + n²
  const B= isPlus ?  2*n : -2*n;
  const C= n*n;
  const correct=fmt3(1,B,C);

  // 干擾項：
  // D1: 漏 2 倍 → ±nx
  const d1=fmt3(1, isPlus?n:-n, C);
  // D2: 最後項變減 → x² ± 2nx - n²
  const d2=fmt3(1,B,-C);
  // D3: 漏中間項 → x² + n²
  const d3=fmt3(1,0,C);

  return {qText,tag,correct,distractors:[d1,d2,d3]};
}

function gen_num_sq_diff(){
  // (x - n)²，加大混淆概率
  const n=randInt(2,9);
  const tag='完全平方公式';
  const qText=`(x - ${n})² = ?`;

  const correct=fmt3(1,-2*n,n*n);
  const d1=fmt3(1,-n,n*n);      // 漏 2 倍
  const d2=fmt3(1,-2*n,-(n*n)); // 常數變減號
  const d3=fmt3(1,0,-(n*n));    // 中間項消失且符號錯
  return {qText,tag,correct,distractors:[d1,d2,d3]};
}

function gen_num_diff_of_sq(){
  const n=randInt(1,9);
  const tag='平方差公式';
  const flip=Math.random()<0.5;
  const qText= flip ? `(x - ${n})(x + ${n}) = ?` : `(x + ${n})(x - ${n}) = ?`;

  const correct=fmt2diff(1,n*n);
  const d1=fmt3(1,0,n*n);        // x² + n²
  const d2=fmt3(1,-n,-(n*n));    // x² - nx - n²
  const d3=fmt3(1,-2*n,n*n);     // 以為是完全平方
  return {qText,tag,correct,distractors:[d1,d2,d3]};
}

// ── 等級三：(ax ± b)²  /  (ax+b)(ax-b)
function gen_coef_sq_sum(){
  const a=pick([2,3,4,5]);
  const b=randInt(1,9);
  const sign=pick(['+','-']);
  const isPlus=sign==='+';
  const tag='完全平方公式';
  const qText=`(${a}x ${sign} ${b})² = ?`;

  // 正確: a²x² ± 2ab·x + b²
  const A2=a*a, B2= isPlus?2*a*b:-(2*a*b), C2=b*b;
  const correct=fmt3(A2,B2,C2);

  // D1: a 忘記平方 (ax² 而非 a²x²)
  const d1=fmt3(a,B2,C2);
  // D2: 2ab 漏掉 2 倍 → a²x² ± ab·x + b²
  const d2=fmt3(A2, isPlus?a*b:-(a*b), C2);
  // D3: 無中間項 → a²x² + b²
  const d3=fmt3(A2,0,C2);

  return {qText,tag,correct,distractors:[d1,d2,d3]};
}

function gen_coef_sq_diff(){
  const a=pick([2,3,4]);
  const b=randInt(1,7);
  const tag='完全平方公式';
  const qText=`(${a}x - ${b})² = ?`;

  const A2=a*a, B2=-(2*a*b), C2=b*b;
  const correct=fmt3(A2,B2,C2);

  const d1=fmt3(a,B2,C2);           // 前項忘記平方
  const d2=fmt3(A2,-(a*b),C2);      // 中間項漏 2 倍
  const d3=fmt3(A2,B2,-(C2));        // 常數項變減號
  return {qText,tag,correct,distractors:[d1,d2,d3]};
}

function gen_coef_diff_of_sq(){
  const a=pick([2,3,4,5]);
  const b=randInt(1,7);
  const tag='平方差公式';
  const flip=Math.random()<0.5;
  const qText= flip
    ? `(${a}x - ${b})(${a}x + ${b}) = ?`
    : `(${a}x + ${b})(${a}x - ${b}) = ?`;

  const correct=fmt2diff(a*a, b*b);
  const d1=fmt3(a*a,0,b*b);                  // a²x² + b²（漏負號）
  const d2=fmt3(a*a, -(2*a*b), b*b);         // 以為是完全平方
  const d3=fmt3(a,0,-(b*b));                  // 前項忘記平方
  return {qText,tag,correct,distractors:[d1,d2,d3]};
}

// ── 出題 dispatcher
const GENERATORS={
  sq_sum:gen_sq_sum, sq_diff:gen_sq_diff, diff_of_sq:gen_diff_of_sq,
  sq_sum_rev:gen_sq_sum_rev, sq_diff_rev:gen_sq_diff_rev, diff_of_sq_rev:gen_diff_of_sq_rev,
  num_sq_sum:gen_num_sq_sum, num_sq_diff:gen_num_sq_diff, num_diff_of_sq:gen_num_diff_of_sq,
  coef_sq_sum:gen_coef_sq_sum, coef_sq_diff:gen_coef_sq_diff, coef_diff_of_sq:gen_coef_diff_of_sq,
};

// ════════════════════════════════════════════
// DOM refs
// ════════════════════════════════════════════
const answerOptionsWrap=document.getElementById('answer-options');
const questionEl=document.getElementById('question');
const qTypeTagEl=document.getElementById('q-type-tag');
const playingArea=document.getElementById('playing-area');
const timeNumEl=document.getElementById('play-time');
const timerBar=document.getElementById('timer-bar');
const progressTextEl=document.getElementById('progress-text');
const progressDotsWrap=document.getElementById('progress-dots');

// ════════════════════════════════════════════
// 選關畫面
// ════════════════════════════════════════════
function renderLevelSelect(){
  const wrap=document.getElementById('level-grid');
  wrap.innerHTML='';
  let total=0;
  LEVELS.forEach(lv=>{
    total+=levelBestScores[lv.id];
    const card=document.createElement('div');
    card.className='level-card'+(lv.id==='ssr'?' ssr-card':'');
    card.style.background=`linear-gradient(135deg,${lv.grad[0]},${lv.grad[1]})`;
    const bestText=levelBestScores[lv.id]>0?`🏆 最佳 ${levelBestScores[lv.id]} 分`:'尚未挑戰';
    card.innerHTML=`
      <div class="emoji">${lv.emoji}</div>
      <div class="info">
        <div class="name">${lv.name}</div>
        <div class="meta">⏱ ${lv.timePerQ}秒/題 &nbsp;✨ ${lv.multiplier}x 分數<br>${lv.desc}</div>
      </div>
      <div class="best">${bestText}</div>`;
    card.addEventListener('click',()=>startLevel(lv));
    wrap.appendChild(card);
  });
  document.getElementById('total-score').textContent=total;
}

// ════════════════════════════════════════════
// 出題 + 渲染選項
// ════════════════════════════════════════════
let currentQ=null;

function nextTypeFromQueue(){
  if(basicQueue.length===0) basicQueue=shuffle([...currentLevel.questionTypes]);
  return basicQueue.shift();
}
function generateAndRender(){
  const type=(currentLevel.id==='basic')?nextTypeFromQueue():pick(currentLevel.questionTypes);
  currentQ=GENERATORS[type]();
  qTypeTagEl.textContent=currentQ.tag;
  questionEl.textContent=currentQ.qText;

  // 取兩個干擾項，共三選項
  const pickedDistractors=shuffle(currentQ.distractors).slice(0,2);
  const opts=shuffle([
    {key:'correct',text:currentQ.correct},
    {key:'d0',text:pickedDistractors[0]},
    {key:'d1',text:pickedDistractors[1]},
  ]);
  currentAnswerKey='correct';

  answerOptionsWrap.innerHTML='';
  tilesByKey={};
  const labels=['A','B','C'];
  const colorClasses=['opt-A','opt-B','opt-C'];
  opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className=`option-btn ${colorClasses[i]}`;
    btn.innerHTML=`<span class="opt-label">${labels[i]}</span><span class="opt-text">${opt.text}</span>`;
    btn.addEventListener('click',()=>handleTileClick(opt.key,btn));
    answerOptionsWrap.appendChild(btn);
    tilesByKey[opt.key]=btn;
  });
}

// ════════════════════════════════════════════
// 進度點
// ════════════════════════════════════════════
function buildProgressDots(){
  progressDotsWrap.innerHTML='';progressDotEls=[];
  for(let i=0;i<TOTAL_Q;i++){
    const d=document.createElement('div');d.className='dot';
    progressDotsWrap.appendChild(d);progressDotEls.push(d);
  }
}
function markDot(correct){
  const idx=questionIndex-1;
  if(progressDotEls[idx]) progressDotEls[idx].classList.add(correct?'dot-correct':'dot-wrong');
}

function showPopup(text,tileEl,color){
  const rect=tileEl.getBoundingClientRect();
  const areaRect=playingArea.getBoundingClientRect();
  const pop=document.createElement('div');
  pop.className='points-popup';pop.textContent=text;pop.style.color=color;
  pop.style.left=(rect.left-areaRect.left+rect.width/2-16)+'px';
  pop.style.top=(rect.top-areaRect.top)+'px';
  playingArea.appendChild(pop);
  setTimeout(()=>pop.remove(),850);
}

// ════════════════════════════════════════════
// 遊戲流程
// ════════════════════════════════════════════
function startLevel(lv){
  currentLevel=lv;
  questionIndex=0;levelScore=0;combo=0;correctCount=0;wrongCount=0;questionActive=false;
  basicQueue=[];
  clearAllTimers();buildProgressDots();
  const badge=document.getElementById('play-level-badge');
  badge.textContent=`${lv.emoji} ${lv.name}`;
  badge.style.background=`linear-gradient(135deg,${lv.grad[0]},${lv.grad[1]})`;
  updatePlayStats();showScreen('playing');nextQuestion();
}

function nextQuestion(){
  questionIndex++;
  if(questionIndex>TOTAL_Q){finishLevel();return;}
  progressTextEl.textContent=`第 ${questionIndex} / ${TOTAL_Q} 題`;
  generateAndRender();
  questionActive=true;
  startQuestionTimer();
}

function startQuestionTimer(){
  clearTimeout(questionTimeout);clearInterval(tickInterval);
  let t=currentLevel.timePerQ;
  timeNumEl.textContent=t;
  timerBar.style.transition='none';
  timerBar.style.width='100%';
  timerBar.style.background='#22c55e';
  void timerBar.offsetWidth;
  timerBar.style.transition=`width ${currentLevel.timePerQ}s linear, background 0.3s`;
  timerBar.style.width='0%';
  tickInterval=setInterval(()=>{
    t--;if(t<0)t=0;
    timeNumEl.textContent=t;
    if(t<=Math.ceil(currentLevel.timePerQ*0.3)) timerBar.style.background='#ef4444';
    else if(t<=Math.ceil(currentLevel.timePerQ*0.6)) timerBar.style.background='#eab308';
  },1000);
  questionTimeout=setTimeout(()=>{clearInterval(tickInterval);handleTimeUp();},currentLevel.timePerQ*1000);
}

function handleTileClick(key,tileEl){
  if(!questionActive)return;
  questionActive=false;
  clearTimeout(questionTimeout);clearInterval(tickInterval);
  const isCorrect=(key===currentAnswerKey);
  if(isCorrect){
    combo++;correctCount++;
    const gained=Math.round((10+combo*2)*currentLevel.multiplier);
    levelScore+=gained;
    tileEl.classList.add('correct-flash');
    showPopup('+'+gained,tileEl,'#4ade80');
  }else{
    combo=0;wrongCount++;
    tileEl.classList.add('wrong-flash');
    const ct=tilesByKey[currentAnswerKey];
    if(ct) ct.classList.add('reveal-flash');
  }
  markDot(isCorrect);updatePlayStats();
  advanceTimeout=setTimeout(()=>{
    tileEl.classList.remove('correct-flash','wrong-flash');
    const ct=tilesByKey[currentAnswerKey];
    if(ct) ct.classList.remove('reveal-flash');
    nextQuestion();
  },600);
}

function handleTimeUp(){
  if(!questionActive)return;
  questionActive=false;
  combo=0;wrongCount++;
  const ct=tilesByKey[currentAnswerKey];
  if(ct) ct.classList.add('reveal-flash');
  markDot(false);updatePlayStats();
  advanceTimeout=setTimeout(()=>{if(ct)ct.classList.remove('reveal-flash');nextQuestion();},700);
}

function updatePlayStats(){
  document.getElementById('play-score').textContent=levelScore;
  document.getElementById('play-combo').textContent=combo;
}

function finishLevel(){
  clearAllTimers();
  const total=correctCount+wrongCount;
  const accuracy=total>0?Math.round((correctCount/total)*100):0;
  const newRecord=levelScore>levelBestScores[currentLevel.id];
  if(newRecord) levelBestScores[currentLevel.id]=levelScore;
  let totalCum=0;LEVELS.forEach(lv=>totalCum+=levelBestScores[lv.id]);
  document.getElementById('result-title').textContent=`${currentLevel.emoji} ${currentLevel.name} 挑戰完成！`;
  document.getElementById('result-score').textContent=levelScore;
  document.getElementById('result-accuracy').textContent=accuracy+'%';
  document.getElementById('result-correct').textContent=correctCount;
  document.getElementById('result-wrong').textContent=wrongCount;
  document.getElementById('result-total-cum').textContent=totalCum;
  const banner=document.getElementById('record-banner');
  if(newRecord){banner.className='record-banner is-new';banner.textContent='🆕 創新紀錄！';}
  else{banner.className='record-banner is-old';banner.textContent=`本等級最佳成績：${levelBestScores[currentLevel.id]} 分`;}
  const icon=document.getElementById('thumbsup-stage').querySelector('.icon');
  if(accuracy>=90) icon.textContent='🏆';
  else if(accuracy>=70) icon.textContent='👍';
  else if(accuracy>=50) icon.textContent='💪';
  else icon.textContent='😅';
  showScreen('result');
}

function backToSelect(){clearAllTimers();questionActive=false;showScreen('select');renderLevelSelect();}

document.getElementById('back-btn').addEventListener('click',backToSelect);
document.getElementById('back-to-select-btn').addEventListener('click',()=>{showScreen('select');renderLevelSelect();});
document.getElementById('retry-level-btn').addEventListener('click',()=>startLevel(currentLevel));

renderLevelSelect();
showScreen('select');
})();
</script>
